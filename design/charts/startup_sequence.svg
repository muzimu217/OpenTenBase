<svg viewBox="0 0 680 480" width="100%" role="img">
  <title>OpenTenBase K8s Startup Sequence</title>
  <desc>Step-by-step startup sequence for deploying OpenTenBase on Kubernetes</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; font-weight: 400 }
    .th { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; font-weight: 500 }
    .ts { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; font-weight: 400 }
    .tl { font-family: Inter, system-ui, sans-serif; font-size: 13px; fill: #2C2C2A; font-weight: 500 }
    .num { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #fff; font-weight: 500 }
  </style>

  <rect x="80" y="20" width="80" height="28" rx="14" fill="#378ADD"/>
  <text class="num" x="120" y="34" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="170" y="20" width="470" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="405" y="42" text-anchor="middle" dominant-baseline="central">Deploy GTM StatefulSet (master + standby)</text>

  <line x1="405" y1="64" x2="405" y2="80" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="80" width="80" height="28" rx="14" fill="#378ADD"/>
  <text class="num" x="120" y="94" text-anchor="middle" dominant-baseline="central">2</text>
  <rect x="170" y="80" width="470" height="44" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="405" y="102" text-anchor="middle" dominant-baseline="central">Wait: GTM health check passes (readiness probe)</text>

  <line x1="405" y1="124" x2="405" y2="140" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="140" width="80" height="28" rx="14" fill="#378ADD"/>
  <text class="num" x="120" y="154" text-anchor="middle" dominant-baseline="central">3</text>
  <rect x="170" y="140" width="470" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="405" y="162" text-anchor="middle" dominant-baseline="central">Deploy DN StatefulSet(s) — initdb each DN pod</text>

  <line x1="405" y1="184" x2="405" y2="200" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="200" width="80" height="28" rx="14" fill="#378ADD"/>
  <text class="num" x="120" y="214" text-anchor="middle" dominant-baseline="central">4</text>
  <rect x="170" y="200" width="470" height="44" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="405" y="222" text-anchor="middle" dominant-baseline="central">DN registration: ALTER NODE + register to GTM</text>

  <line x1="405" y1="244" x2="405" y2="260" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="260" width="80" height="28" rx="14" fill="#378ADD"/>
  <text class="num" x="120" y="274" text-anchor="middle" dominant-baseline="central">5</text>
  <rect x="170" y="260" width="470" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="405" y="282" text-anchor="middle" dominant-baseline="central">Deploy CN StatefulSet(s) — initdb each CN pod</text>

  <line x1="405" y1="304" x2="405" y2="320" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="320" width="80" height="28" rx="14" fill="#378ADD"/>
  <text class="num" x="120" y="334" text-anchor="middle" dominant-baseline="central">6</text>
  <rect x="170" y="320" width="470" height="44" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="405" y="342" text-anchor="middle" dominant-baseline="central">CN registration: CREATE NODE for each DN + CREATE NODE GROUP</text>

  <line x1="405" y1="364" x2="405" y2="380" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="380" width="80" height="28" rx="14" fill="#1D9E75"/>
  <text class="num" x="120" y="394" text-anchor="middle" dominant-baseline="central">7</text>
  <rect x="170" y="380" width="470" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="405" y="402" text-anchor="middle" dominant-baseline="central">Expose cn-rw Service — cluster ready for connections</text>

  <line x1="405" y1="424" x2="405" y2="440" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="440" width="470" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="405" y="462" text-anchor="middle" dominant-baseline="central">Post-start: PgBouncer sidecar, Prometheus metrics, backup agent</text>
</svg>
